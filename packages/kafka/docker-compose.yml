services:
  kafka-broker-1:
    image: apache/kafka:3.7.0
    container_name: kafka-broker-1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      # ONLY EXTERNAL LISTENER
      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9094

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: EXTERNAL

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker-1:9093,2@kafka-broker-2:9093,3@kafka-broker-3:9093
      KAFKA_CLUSTER_ID: 7Dvn0OLMQo-bg4qmCmflVg
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3

    ports:
      - "9094:9094"

    networks:
      - kafka-network

  kafka-broker-2:
    image: apache/kafka:3.7.0
    container_name: kafka-broker-2
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9095,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9095

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: EXTERNAL

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker-1:9093,2@kafka-broker-2:9093,3@kafka-broker-3:9093
      KAFKA_CLUSTER_ID: 7Dvn0OLMQo-bg4qmCmflVg
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3

    ports:
      - "9095:9095"

    networks:
      - kafka-network

  kafka-broker-3:
    image: apache/kafka:3.7.0
    container_name: kafka-broker-3
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9096,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9096

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: EXTERNAL

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker-1:9093,2@kafka-broker-2:9093,3@kafka-broker-3:9093
      KAFKA_CLUSTER_ID: 7Dvn0OLMQo-bg4qmCmflVg
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3

    ports:
      - "9096:9096"

    networks:
      - kafka-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: local-cluster

      # IMPORTANT: use EXTERNAL endpoints
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: localhost:9094,localhost:9095,localhost:9096

    ports:
      - "8080:8080"

    depends_on:
      - kafka-broker-1
      - kafka-broker-2
      - kafka-broker-3

    networks:
      - kafka-network

networks:
  kafka-network:
    driver: bridge
